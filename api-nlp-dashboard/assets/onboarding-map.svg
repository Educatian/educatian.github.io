<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Five-step onboarding map for an API to NLP dashboard</title>
  <desc id="desc">A concept map showing five beginner steps: question, source, collect, enrich, and review.</desc>
  <rect width="1200" height="720" fill="#fffdf8"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#182126" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#284c63"/></marker>
  </defs>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <text x="70" y="82" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900" letter-spacing="4" fill="#b35c35">BEGINNER ONBOARDING MAP</text>
  <text x="70" y="132" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900" fill="#182126">Start with the loop, not the code.</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(70 220)">
      <rect width="170" height="230" rx="14" fill="#f2eadc" stroke="#182126" stroke-width="3"/>
      <circle cx="38" cy="38" r="20" fill="#284c63"/><text x="31" y="46" font-size="22" font-weight="900" fill="#fff">1</text>
      <text x="28" y="94" font-size="22" font-weight="900" fill="#182126">Question</text>
      <text x="28" y="128" font-size="16" fill="#314048">What decision</text>
      <text x="28" y="151" font-size="16" fill="#314048">should this</text>
      <text x="28" y="174" font-size="16" fill="#314048">dashboard support?</text>
    </g>
    <path d="M255 335H322" stroke="#284c63" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(335 220)">
      <rect width="170" height="230" rx="14" fill="#fffdf8" stroke="#182126" stroke-width="3"/>
      <circle cx="38" cy="38" r="20" fill="#b35c35"/><text x="31" y="46" font-size="22" font-weight="900" fill="#fff">2</text>
      <text x="28" y="94" font-size="22" font-weight="900" fill="#182126">Source</text>
      <text x="28" y="128" font-size="16" fill="#314048">Write API URL,</text>
      <text x="28" y="151" font-size="16" fill="#314048">auth, rate limit,</text>
      <text x="28" y="174" font-size="16" fill="#314048">and cadence.</text>
    </g>
    <path d="M520 335H587" stroke="#284c63" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(600 220)">
      <rect width="170" height="230" rx="14" fill="#f4f8ef" stroke="#182126" stroke-width="3"/>
      <circle cx="38" cy="38" r="20" fill="#596f4f"/><text x="31" y="46" font-size="22" font-weight="900" fill="#fff">3</text>
      <text x="28" y="94" font-size="22" font-weight="900" fill="#182126">Collect</text>
      <text x="28" y="128" font-size="16" fill="#314048">Save raw JSON</text>
      <text x="28" y="151" font-size="16" fill="#314048">or HTML before</text>
      <text x="28" y="174" font-size="16" fill="#314048">cleaning it.</text>
    </g>
    <path d="M785 335H852" stroke="#284c63" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(865 220)">
      <rect width="170" height="230" rx="14" fill="#fff7df" stroke="#182126" stroke-width="3"/>
      <circle cx="38" cy="38" r="20" fill="#b4862e"/><text x="31" y="46" font-size="22" font-weight="900" fill="#fff">4</text>
      <text x="28" y="94" font-size="22" font-weight="900" fill="#182126">Enrich</text>
      <text x="28" y="128" font-size="16" fill="#314048">Run NLP once,</text>
      <text x="28" y="151" font-size="16" fill="#314048">store outputs,</text>
      <text x="28" y="174" font-size="16" fill="#314048">track version.</text>
    </g>
    <path d="M950 470C830 620 380 620 245 470" stroke="#284c63" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="365" y="535" width="470" height="92" rx="14" fill="#182126"/>
    <text x="395" y="572" font-size="22" font-weight="900" fill="#fffdf8">5. Review the dashboard</text>
    <text x="395" y="598" font-size="16" fill="#d9cfbd">False positives become better parsing rules,</text>
    <text x="395" y="620" font-size="16" fill="#d9cfbd">NLP prompts, and source contracts.</text>
  </g>
</svg>

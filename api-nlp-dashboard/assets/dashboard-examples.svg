<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Three example NLP dashboards</title>
  <desc id="desc">Three example dashboard shapes for one API to NLP pipeline.</desc>
  <rect width="1400" height="900" fill="#f2eadc"/>
  <text x="78" y="88" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="5" fill="#b35c35">DASHBOARD EXAMPLES</text>
  <text x="78" y="144" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" fill="#182126">One pipeline, many dashboard shapes.</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(78 250)">
      <rect width="385" height="520" rx="20" fill="#fffdf8" stroke="#182126" stroke-width="3"/>
      <rect width="385" height="78" rx="20" fill="#182126"/>
      <text x="28" y="48" font-size="24" font-weight="900" fill="#fffdf8">Literature Monitor</text>
      <text x="28" y="126" font-size="15" fill="#314048">Question: which methods and topics are rising?</text>
      <rect x="28" y="172" width="146" height="74" rx="9" fill="#e7eef3"/><text x="48" y="202" font-size="15" font-weight="900" fill="#284c63">NEW WORKS</text><text x="48" y="232" font-size="29" font-weight="900">486</text>
      <polyline points="40,365 102,323 150,342 194,285 255,303 340,250" fill="none" stroke="#284c63" stroke-width="6"/>
      <text x="28" y="430" font-size="17" font-weight="900">NLP outputs</text><text x="28" y="458" font-size="15">topics, methods, entities, summaries</text>
    </g>
    <g transform="translate(507 250)">
      <rect width="385" height="520" rx="20" fill="#fffdf8" stroke="#182126" stroke-width="3"/>
      <rect width="385" height="78" rx="20" fill="#284c63"/>
      <text x="28" y="48" font-size="24" font-weight="900" fill="#fffdf8">Feedback Pulse</text>
      <text x="28" y="126" font-size="15" fill="#314048">Question: what needs instructor attention?</text>
      <rect x="28" y="182" width="330" height="42" rx="8" fill="#eef5ea"/><rect x="28" y="182" width="242" height="42" rx="8" fill="#596f4f"/><text x="46" y="209" font-size="17" font-weight="900" fill="#fff">clarity 74%</text>
      <rect x="28" y="240" width="330" height="42" rx="8" fill="#fff7df"/><rect x="28" y="240" width="180" height="42" rx="8" fill="#b4862e"/><text x="46" y="267" font-size="17" font-weight="900" fill="#fff">workload 55%</text>
      <text x="28" y="430" font-size="17" font-weight="900">NLP outputs</text><text x="28" y="458" font-size="15">sentiment, issue labels, quote clusters</text>
    </g>
    <g transform="translate(936 250)">
      <rect width="385" height="520" rx="20" fill="#fffdf8" stroke="#182126" stroke-width="3"/>
      <rect width="385" height="78" rx="20" fill="#b35c35"/>
      <text x="28" y="48" font-size="24" font-weight="900" fill="#fffdf8">Policy Tracker</text>
      <text x="28" y="126" font-size="15" fill="#314048">Question: what changed and who is affected?</text>
      <rect x="28" y="182" width="330" height="60" rx="8" fill="#e7eef3"/><text x="44" y="212" font-size="17" font-weight="900">New deadline detected</text><text x="44" y="234" font-size="14">grant, compliance, 2026-05</text>
      <rect x="28" y="260" width="330" height="60" rx="8" fill="#fff7df"/><text x="44" y="290" font-size="17" font-weight="900">Eligibility language changed</text><text x="44" y="312" font-size="14">institution, role, funding cap</text>
      <text x="28" y="430" font-size="17" font-weight="900">NLP outputs</text><text x="28" y="458" font-size="15">change type, actor, deadline</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#d7e2df" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2 2 L14 8 L2 14 Z" fill="#152427"/>
    </marker>
  </defs>
  <rect width="1400" height="760" fill="#eef4f1"/>
  <rect width="1400" height="760" fill="url(#grid)" opacity=".7"/>
  <rect x="56" y="54" width="1288" height="650" rx="26" fill="#fffdf8" stroke="#152427" stroke-width="5"/>

  <text x="100" y="116" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="4" fill="#0B766E">EVENT GRAMMAR</text>
  <text x="100" y="162" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#152427">A log row becomes useful only when</text>
  <text x="100" y="206" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#152427">five pieces fit together.</text>
  <text x="100" y="248" font-family="Inter, Arial, sans-serif" font-size="20" fill="#405458">The field named event is not enough. The same click can mean navigation, help-seeking, assessment work, or noise.</text>

  <g transform="translate(100 300)">
    <rect x="0" y="0" width="190" height="118" rx="18" fill="#e5f3ef" stroke="#152427" stroke-width="3"/>
    <text x="26" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#152427">Actor</text>
    <text x="26" y="76" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#405458">learner_id</text>
    <text x="26" y="104" font-family="Inter, Arial, sans-serif" font-size="14" fill="#738680">who acted?</text>

    <line x1="204" y1="59" x2="244" y2="59" stroke="#152427" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="258" y="0" width="190" height="118" rx="18" fill="#fff" stroke="#152427" stroke-width="3"/>
    <text x="284" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#152427">Time</text>
    <text x="284" y="76" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#405458">event_time</text>
    <text x="284" y="104" font-family="Inter, Arial, sans-serif" font-size="14" fill="#738680">when?</text>

    <line x1="462" y1="59" x2="502" y2="59" stroke="#152427" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="516" y="0" width="190" height="118" rx="18" fill="#f7dfd8" stroke="#B5392A" stroke-width="3"/>
    <text x="542" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#152427">Action</text>
    <text x="542" y="76" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#405458">event_type</text>
    <text x="542" y="104" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8d4b42">what happened?</text>

    <line x1="720" y1="59" x2="760" y2="59" stroke="#152427" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="774" y="0" width="190" height="118" rx="18" fill="#fff" stroke="#152427" stroke-width="3"/>
    <text x="800" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#152427">Object</text>
    <text x="800" y="76" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#405458">object_id</text>
    <text x="800" y="104" font-family="Inter, Arial, sans-serif" font-size="14" fill="#738680">acted on what?</text>

    <line x1="978" y1="59" x2="1018" y2="59" stroke="#152427" stroke-width="5" marker-end="url(#arrow)"/>

    <rect x="1032" y="0" width="190" height="118" rx="18" fill="#152427" stroke="#152427" stroke-width="3"/>
    <text x="1058" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#fffdf8">Context</text>
    <text x="1058" y="76" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#dfe9e5">activity</text>
    <text x="1058" y="104" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b8c8c4">why meaningful?</text>
  </g>

  <g transform="translate(150 500)">
    <rect x="0" y="0" width="1100" height="112" rx="20" fill="#152427" stroke="#152427" stroke-width="4"/>
    <text x="34" y="44" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#fffdf8">One interpretable event row</text>
    <text x="34" y="82" font-family="JetBrains Mono, Consolas, monospace" font-size="22" fill="#dfe9e5">P014  ·  2026-02-10T14:03Z  ·  opened_help  ·  hint_panel  ·  algebra_practice</text>
  </g>

  <g transform="translate(150 650)">
    <rect x="0" y="0" width="20" height="20" rx="5" fill="#f7dfd8" stroke="#B5392A" stroke-width="2"/>
    <text x="32" y="17" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#152427">Common mistake:</text>
    <text x="226" y="17" font-family="Inter, Arial, sans-serif" font-size="18" fill="#405458">treating click, view, and submit as self-explanatory instead of contextual actions.</text>
  </g>
</svg>

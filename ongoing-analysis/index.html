<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Ongoing Data Analysis — Educatian</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,800;1,400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#F0EAE0;--ink:#1a1a1a;--rust:#B5392A;--line:#cec8be}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:'Inter',sans-serif;line-height:1.6}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.30;
  background-image:linear-gradient(rgba(26,26,26,.06) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(26,26,26,.06) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at 30% 20%,black 30%,transparent 80%)}
.shell{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:96px 32px}
.kicker{font-size:13px;font-weight:800;letter-spacing:4px;text-transform:uppercase;
  color:var(--rust);margin-bottom:18px}
.h1{font-size:48px;font-weight:900;line-height:1.05;letter-spacing:-.025em;margin:0 0 48px}
.h1 .serif{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:400}
.item{display:flex;align-items:baseline;gap:14px;padding:22px 4px;
  border-bottom:1px solid var(--line)}
.item:first-of-type{border-top:1px solid var(--line)}
.item .date{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#6b6457;
  white-space:nowrap}
.item a{font-size:18px;font-weight:600;color:var(--ink);text-decoration:none}
.item a:hover{color:var(--rust)}
.item .lock{font-size:13px;color:#6b6457}
.foot{margin-top:64px;font-size:13.5px;color:#6b6457}
.foot a{color:var(--rust);text-decoration:none}
@media(max-width:600px){.h1{font-size:34px}.shell{padding:64px 20px}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="shell">
  <div class="kicker">Educatian · Research</div>
  <h1 class="h1">Ongoing <span class="serif">data analysis</span></h1>

  <div class="item">
    <span class="date">2026-06</span>
    <a href="tina-aied-identity.html">Chatbot-Mediated Teacher Reflection — Working Analysis</a>
    <span class="lock">&#128274;</span>
  </div>

  <div class="foot">
    Pre-publication materials, passcode-protected. Please do not cite or circulate.
    · <a href="https://educatian.github.io/">Educatian home</a>
  </div>
</div>
</body>
</html>

  <text x="118" y="378" fill="#182126" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-style="italic">trace mastery over time</text>

  <text x="118" y="446" fill="#43525A" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="400">dataframe design · tested packages · visualization · troubleshooting</text>


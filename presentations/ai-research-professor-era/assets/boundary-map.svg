<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" rx="40" fill="#1E1A1A"/>
  <rect x="60" y="60" width="1280" height="780" rx="28" fill="#262121" stroke="#564C4C" stroke-width="2"/>
  <text x="94" y="130" fill="#F5E7E9" font-family="Noto Sans KR, Arial, sans-serif" font-size="30" font-weight="700">AI Boundary Map for Research Professors</text>
  <text x="94" y="170" fill="#C9BCB8" font-family="Noto Sans KR, Arial, sans-serif" font-size="20">Use AI aggressively in the fast layer; slow down where academic responsibility sits.</text>

  <rect x="106" y="232" width="534" height="470" rx="28" fill="#FFF8F7" stroke="#D6C7C5" stroke-width="2"/>
  <rect x="760" y="232" width="534" height="470" rx="28" fill="#351F23" stroke="#A4505D" stroke-width="2"/>

  <text x="148" y="290" fill="#9E1B32" font-family="Noto Sans KR, Arial, sans-serif" font-size="26" font-weight="800">Fast Layer: delegate and accelerate</text>
  <text x="804" y="290" fill="#FFDFE4" font-family="Noto Sans KR, Arial, sans-serif" font-size="26" font-weight="800">Slow Layer: retain human judgment</text>

  <g font-family="Noto Sans KR, Arial, sans-serif" font-size="22">
    <rect x="146" y="330" width="454" height="72" rx="18" fill="#F7ECEB"/>
    <text x="174" y="374" fill="#171616">Literature triage and search expansion</text>
    <rect x="146" y="420" width="454" height="72" rx="18" fill="#F7ECEB"/>
    <text x="174" y="464" fill="#171616">Summary, comparison, and translation</text>
    <rect x="146" y="510" width="454" height="72" rx="18" fill="#F7ECEB"/>
    <text x="174" y="554" fill="#171616">Code scaffolding and debug suggestions</text>
    <rect x="146" y="600" width="454" height="72" rx="18" fill="#F7ECEB"/>
    <text x="174" y="644" fill="#171616">Early drafts, formatting, title variants</text>

    <rect x="800" y="330" width="454" height="72" rx="18" fill="#47292E"/>
    <text x="828" y="374" fill="#FFF4F3">Research question choice and framing</text>
    <rect x="800" y="420" width="454" height="72" rx="18" fill="#47292E"/>
    <text x="828" y="464" fill="#FFF4F3">Source verification and citation checks</text>
    <rect x="800" y="510" width="454" height="72" rx="18" fill="#47292E"/>
    <text x="828" y="554" fill="#FFF4F3">Interpretation of findings and claims</text>
    <rect x="800" y="600" width="454" height="72" rx="18" fill="#47292E"/>
    <text x="828" y="644" fill="#FFF4F3">Disclosure, authorship, peer judgment</text>
  </g>

  <path d="M680 470H730" stroke="#C86B79" stroke-width="10" stroke-linecap="round"/>
  <path d="M702 444L736 470L702 496" stroke="#C86B79" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="106" y="732" width="1188" height="72" rx="18" fill="#9E1B321A" stroke="#A4505D" stroke-width="2"/>
  <text x="138" y="776" fill="#E4D3D0" font-family="Noto Sans KR, Arial, sans-serif" font-size="21">The professor’s survival task is not to ban the left side, but to make the right side explicit, teachable, and auditable.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">TeachPlay amendment packet example</title>
  <desc id="desc">A visual example of an amendment packet for TeachPlay with inputs, drafting steps, and final documents.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf8}
      .title{font:900 34px Inter,Arial,sans-serif;fill:#182126}
      .sub{font:500 15px Inter,Arial,sans-serif;fill:#5c6870}
      .m{font:800 12px 'JetBrains Mono',Consolas,monospace;letter-spacing:1.4px;fill:#284c63}
      .h{font:900 21px Inter,Arial,sans-serif;fill:#182126}
      .s{font:500 14px Inter,Arial,sans-serif;fill:#4e5b62}
      .box{fill:#f2eadc;stroke:#182126;stroke-width:2.5;rx:16}
      .repo{fill:#eef4f6;stroke:#284c63;stroke-width:2.5;rx:16}
      .doc{fill:#f4f8ee;stroke:#596f4f;stroke-width:2.5;rx:16}
      .warn{fill:#fff7df;stroke:#b4862e;stroke-width:2.5;rx:16}
      .line{stroke:#284c63;stroke-width:3.5;fill:none}
    </style>
  </defs>
  <rect width="1200" height="720" class="bg"/>
  <text x="56" y="68" class="title">TeachPlay example packet</text>
  <text x="56" y="98" class="sub">A public-safe model for an AI microcredential study amendment</text>

  <rect x="56" y="150" width="238" height="112" class="box"/>
  <text x="82" y="187" class="m">VAULT</text>
  <text x="82" y="218" class="h">Project facts</text>
  <text x="82" y="244" class="s">Funder, study purpose, status</text>

  <rect x="56" y="304" width="238" height="112" class="repo"/>
  <text x="82" y="341" class="m">REPO</text>
  <text x="82" y="372" class="h">Site features</text>
  <text x="82" y="398" class="s">AI policy, portfolio, surveys</text>

  <rect x="56" y="458" width="238" height="112" class="warn"/>
  <text x="82" y="495" class="m">BASELINE</text>
  <text x="82" y="526" class="h">Approved IRB docs</text>
  <text x="82" y="552" class="s">Protocol, consent, scripts</text>

  <path d="M294 206 C370 206 390 206 456 206" class="line"/>
  <path d="M294 360 C374 360 390 320 456 295" class="line"/>
  <path d="M294 514 C374 514 390 400 456 384" class="line"/>

  <rect x="456" y="166" width="292" height="72" class="repo"/>
  <text x="486" y="210" class="h">1. Inventory changes</text>
  <rect x="456" y="258" width="292" height="72" class="repo"/>
  <text x="486" y="302" class="h">2. Build delta table</text>
  <rect x="456" y="350" width="292" height="72" class="repo"/>
  <text x="486" y="394" class="h">3. Draft inserts</text>
  <rect x="456" y="442" width="292" height="72" class="repo"/>
  <text x="486" y="486" class="h">4. Human redline</text>

  <path d="M748 202 C790 202 808 175 850 174" class="line"/>
  <path d="M748 294 C792 294 808 276 850 275" class="line"/>
  <path d="M748 386 C792 386 808 377 850 376" class="line"/>
  <path d="M748 478 C792 478 808 478 850 478" class="line"/>

  <rect x="850" y="126" width="296" height="76" class="doc"/>
  <text x="878" y="157" class="m">HRP-503-STYLE</text>
  <text x="878" y="185" class="h">Protocol delta</text>

  <rect x="850" y="228" width="296" height="76" class="doc"/>
  <text x="878" y="259" class="m">HRP-502-STYLE</text>
  <text x="878" y="287" class="h">Consent language</text>

  <rect x="850" y="330" width="296" height="76" class="doc"/>
  <text x="878" y="361" class="m">APPENDIX</text>
  <text x="878" y="389" class="h">Survey + log dictionary</text>

  <rect x="850" y="432" width="296" height="76" class="doc"/>
  <text x="878" y="463" class="m">REVIEW</text>
  <text x="878" y="491" class="h">Crosswalk for IRB</text>

  <rect x="456" y="580" width="690" height="74" class="warn"/>
  <text x="486" y="611" class="m">PI CHECKPOINT</text>
  <text x="486" y="638" class="s">The assistant drafts. The investigator verifies risk, consent promises, template version, and final submission.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian vault setup for IRB amendment automation</title>
  <desc id="desc">A step-by-step visual from installing Obsidian to creating a vault, adding project notes, linking GitHub repositories, and generating IRB amendment packets.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#284c63"/></marker>
    <style>
      .bg{fill:#f2eadc}.card{fill:#fffdf8;stroke:#182126;stroke-width:3;rx:18}.soft{fill:#eef4f6;stroke:#284c63;stroke-width:3;rx:18}.out{fill:#f4f8ee;stroke:#596f4f;stroke-width:3;rx:18}.line{stroke:#284c63;stroke-width:3.5;fill:none;marker-end:url(#arrow)}.h{font:900 34px Inter,Arial,sans-serif;fill:#182126}.t{font:850 20px Inter,Arial,sans-serif;fill:#182126}.s{font:500 14px Inter,Arial,sans-serif;fill:#536168}.m{font:800 12px 'JetBrains Mono',Consolas,monospace;letter-spacing:1.4px;fill:#284c63}
    </style>
  </defs>
  <rect width="1200" height="720" class="bg"/>
  <text x="56" y="70" class="h">Obsidian-first setup</text>
  <text x="56" y="100" class="s">Start local-first, then connect projects, GitHub, and IRB packet outputs.</text>

  <rect x="70" y="160" width="210" height="116" class="card"/>
  <text x="96" y="198" class="m">STEP 1</text>
  <text x="96" y="228" class="t">Install Obsidian</text>
  <text x="96" y="252" class="s">Use official download</text>

  <rect x="355" y="160" width="210" height="116" class="card"/>
  <text x="381" y="198" class="m">STEP 2</text>
  <text x="381" y="228" class="t">Create vault</text>
  <text x="381" y="252" class="s">Local folder of .md notes</text>

  <rect x="640" y="160" width="210" height="116" class="soft"/>
  <text x="666" y="198" class="m">STEP 3</text>
  <text x="666" y="228" class="t">Add entities</text>
  <text x="666" y="252" class="s">TeachPlay, ALGET, ETHOBOT</text>

  <rect x="925" y="160" width="210" height="116" class="soft"/>
  <text x="951" y="198" class="m">STEP 4</text>
  <text x="951" y="228" class="t">Link GitHub</text>
  <text x="951" y="252" class="s">Repo URL + feature traces</text>

  <rect x="212" y="420" width="270" height="122" class="soft"/>
  <text x="242" y="459" class="m">PROJECT NOTE</text>
  <text x="242" y="490" class="t">IRB-facing facts</text>
  <text x="242" y="516" class="s">Participants, procedures, data, instruments</text>

  <rect x="558" y="420" width="270" height="122" class="out"/>
  <text x="588" y="459" class="m">PACKET OUTPUT</text>
  <text x="588" y="490" class="t">Amendment folder</text>
  <text x="588" y="516" class="s">Delta, consent, data flow, appendices</text>

  <path d="M280 218 C310 218 328 218 355 218" class="line"/>
  <path d="M565 218 C595 218 612 218 640 218" class="line"/>
  <path d="M850 218 C880 218 898 218 925 218" class="line"/>
  <path d="M745 276 C704 335 560 396 482 452" class="line"/>
  <path d="M482 481 C510 481 532 481 558 481" class="line"/>
  <text x="232" y="640" class="s">Minimum useful vault: one project note, one IRB baseline pointer, one repo pointer, one instrument pointer, one change-request note.</text>
</svg>

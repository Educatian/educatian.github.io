<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>학술 잡마켓 어드바이스 핸드북 · 비공개</title>
<meta name="robots" content="noindex,nofollow" />
<style>
  :root{
    --ink:#0b1538; --muted:#4a5578; --accent:#1d4ed8; --accent-deep:#1e40af;
    --plum:#7c3aed; --rule:#e2e6f4; --bg:#f5f7fc; --card:#fff;
    --shadow:0 1px 2px rgba(11,21,56,0.04),0 6px 20px rgba(11,21,56,0.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 500px at 8% -8%, #e8edff 0%, transparent 55%),
      radial-gradient(700px 400px at 110% 10%, #fef3e6 0%, transparent 50%),
      var(--bg);
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    padding:24px;-webkit-font-smoothing:antialiased;word-break:keep-all;
  }
  .gate{
    background:var(--card);border:1px solid var(--rule);border-radius:18px;
    padding:36px 38px;max-width:440px;width:100%;box-shadow:var(--shadow);
  }
  .eyebrow{
    font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--accent);margin-bottom:10px;display:block;
  }
  .gate h1{
    margin:0 0 6px;font-size:1.55rem;letter-spacing:-0.018em;line-height:1.25;
    background:linear-gradient(110deg,var(--ink) 0%,var(--accent-deep) 55%,var(--plum) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .gate .sub{margin:0 0 22px;color:var(--muted);font-size:0.92rem;line-height:1.55}
  form{display:flex;flex-direction:column;gap:10px}
  input[type=password]{
    font-family:inherit;font-size:1rem;padding:12px 14px;
    border:1px solid var(--rule);border-radius:10px;background:#fafbff;
    color:var(--ink);outline:none;transition:border-color .12s,background .12s;
    width:100%;
  }
  input[type=password]:focus{border-color:var(--accent);background:#fff}
  button{
    font-family:inherit;font-size:0.98rem;font-weight:600;
    padding:12px 14px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;
    box-shadow:0 2px 8px rgba(29,78,216,0.28);
    transition:transform .08s,box-shadow .12s;
  }
  button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,78,216,0.36)}
  button:active{transform:translateY(0)}
  button[disabled]{opacity:.6;cursor:not-allowed;transform:none}
  .err{margin-top:12px;color:#b91c1c;font-size:0.85rem;min-height:1.1em;font-weight:500}
  .meta{margin-top:22px;padding-top:16px;border-top:1px solid var(--rule);
    font-size:0.76rem;color:var(--muted);line-height:1.55;}
  .meta code{
    background:#eef0f8;padding:1px 6px;border-radius:3px;font-size:0.75rem;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
</style>
</head>
<body>
  <div class="gate">
    <span class="eyebrow">Restricted · Job Market Handbook</span>
    <h1>학술 잡마켓 어드바이스 핸드북</h1>
    <p class="sub">비공개 멘티·멘토용 문서입니다. 운영자에게 받은 비밀번호를 입력하세요.</p>
    <form id="f" autocomplete="off">
      <input id="pw" type="password" autocomplete="current-password" placeholder="Password" autofocus />
      <button type="submit" id="b">열기</button>
    </form>
    <div class="err" id="err">&nbsp;</div>

const ITER=250000;

function b64dec(s){
  const bin=atob(s);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return arr;
}

document.getElementById('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('b');
  err.textContent=' ';
  btn.disabled=true;btn.textContent='복호화 중…';
  try{
    const salt=b64dec(SALT_B64);
    const iv=b64dec(IV_B64);
    const ct=b64dec(CT_B64);
    const enc=new TextEncoder();
    const keyMaterial=await crypto.subtle.importKey(
      'raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']
    );
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},
      keyMaterial,
      {name:'AES-GCM',length:256},
      false,['decrypt']
    );
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    const html=new TextDecoder().decode(plain);
    document.open();
    document.write(html);
    document.close();
  }catch(ex){
    btn.disabled=false;btn.textContent='열기';
    err.textContent='비밀번호가 올바르지 않습니다.';
    const pwEl=document.getElementById('pw');
    pwEl.value='';pwEl.focus();
  }
});
</script>

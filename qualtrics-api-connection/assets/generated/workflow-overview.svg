<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100"
     font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1800" height="1100" fill="#fdf8f5"/>

  <!-- title -->
  <text x="120" y="80" font-size="20" font-weight="700"
        letter-spacing="0.18em" fill="#9E1B32" text-transform="uppercase">FIGURE · OVERVIEW</text>
  <text x="120" y="138" font-size="42" font-weight="700" fill="#2c2a29">
    Eight prompts, one survey
  </text>
  <text x="120" y="180" font-size="28" fill="#6e6967">
    Token → empty shell → questions → blocks → cohort tag → branding → activate → export.
  </text>

  <!-- baseline dotted -->
  <line x1="140" y1="600" x2="1660" y2="600" stroke="#d6cfc8"
        stroke-width="1.5" stroke-dasharray="3 6"/>

  <!-- LEFT: KEY (token) -->
  <g transform="translate(140,495)">
    <circle cx="18" cy="20" r="17" fill="none" stroke="#9E1B32" stroke-width="4"/>
    <circle cx="18" cy="20" r="5" fill="#9E1B32"/>
    <line x1="35" y1="20" x2="80" y2="20" stroke="#9E1B32" stroke-width="4" stroke-linecap="round"/>
    <line x1="68" y1="20" x2="68" y2="33" stroke="#9E1B32" stroke-width="4" stroke-linecap="round"/>
    <line x1="76" y1="20" x2="76" y2="29" stroke="#9E1B32" stroke-width="4" stroke-linecap="round"/>
    <text x="40" y="100" font-size="24" font-weight="700" fill="#9E1B32"
          letter-spacing="0.1em" text-anchor="middle">TOKEN</text>
  </g>

  <!-- thin connector line through cards -->
  <line x1="245" y1="515" x2="1610" y2="515" stroke="#9E1B32" stroke-width="1.6"/>

  <defs>
    <g id="card-frame">
      <rect x="0" y="0" width="150" height="200" rx="5"
            fill="#fefcfa" stroke="#d6cfc8" stroke-width="1.2"/>
    </g>
  </defs>

  <!-- 8 cards: x positions 270, 450, 630, 810, 990, 1170, 1350, 1530 (gap 180) -->
  <!-- card y=400, height 200, glyph y~85, step dot y=-15, label y=265 / y=305 -->

  <!-- CARD 01 -->
  <g transform="translate(270,400)">
    <use href="#card-frame"/>
    <circle cx="75" cy="100" r="28" fill="none" stroke="#2c2a29" stroke-width="2.5"/>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 01</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Connect</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">token</text>
  </g>

  <!-- CARD 02 -->
  <g transform="translate(450,400)">
    <use href="#card-frame"/>
    <rect x="50" y="73" width="50" height="50" fill="none" stroke="#2c2a29" stroke-width="2.5"/>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 02</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Empty</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">survey</text>
  </g>

  <!-- CARD 03 -->
  <g transform="translate(630,400)">
    <use href="#card-frame"/>
    <line x1="42" y1="84" x2="108" y2="84" stroke="#2c2a29" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="100" x2="108" y2="100" stroke="#2c2a29" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="116" x2="92" y2="116" stroke="#2c2a29" stroke-width="3" stroke-linecap="round"/>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 03</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Add</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">questions</text>
  </g>

  <!-- CARD 04 -->
  <g transform="translate(810,400)">
    <use href="#card-frame"/>
    <circle cx="55" cy="80" r="6" fill="#2c2a29"/>
    <circle cx="55" cy="120" r="6" fill="#2c2a29"/>
    <circle cx="100" cy="100" r="6" fill="#2c2a29"/>
    <line x1="61" y1="80" x2="94" y2="100" stroke="#2c2a29" stroke-width="2"/>
    <line x1="61" y1="120" x2="94" y2="100" stroke="#2c2a29" stroke-width="2"/>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 04</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Group</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">into blocks</text>
  </g>

  <!-- CARD 05 -->
  <g transform="translate(990,400)">
    <use href="#card-frame"/>
    <g transform="translate(75,100)" stroke="#2c2a29" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-28" x2="0" y2="28"/>
      <line x1="-28" y1="0" x2="28" y2="0"/>
      <line x1="-19" y1="-19" x2="19" y2="19"/>
      <line x1="-19" y1="19" x2="19" y2="-19"/>
    </g>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 05</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Cohort</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">tag</text>
  </g>

  <!-- CARD 06 -->
  <g transform="translate(1170,400)">
    <use href="#card-frame"/>
    <rect x="48" y="72" width="54" height="56" rx="4" fill="#9E1B32" opacity="0.92"/>
    <rect x="58" y="84" width="34" height="7" fill="#fefcfa"/>
    <rect x="58" y="98" width="26" height="7" fill="#fefcfa"/>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 06</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Brand</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">theme</text>
  </g>

  <!-- CARD 07 -->
  <g transform="translate(1350,400)">
    <use href="#card-frame"/>
    <polygon points="42,114 110,72 80,98 110,72 86,124" fill="none" stroke="#2c2a29" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="80" y1="98" x2="86" y2="124" stroke="#2c2a29" stroke-width="2.5"/>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 07</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Activate</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">&amp; distribute</text>
  </g>

  <!-- CARD 08 -->
  <g transform="translate(1530,400)">
    <use href="#card-frame"/>
    <line x1="75" y1="68" x2="75" y2="124" stroke="#2c2a29" stroke-width="3" stroke-linecap="round"/>
    <polyline points="55,104 75,127 95,104" fill="none" stroke="#2c2a29" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="55" y1="142" x2="95" y2="142" stroke="#2c2a29" stroke-width="3" stroke-linecap="round"/>
    <circle cx="75" cy="-15" r="5" fill="#9E1B32"/>
    <text x="75" y="240" font-size="22" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 08</text>
    <text x="75" y="278" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">Export</text>
    <text x="75" y="314" font-size="28" font-weight="700" fill="#2c2a29" text-anchor="middle">responses</text>
  </g>

  <!-- RIGHT: PAPER STACK (responses) -->
  <g transform="translate(1700,490)">
    <rect x="0" y="0" width="74" height="98" rx="3" fill="#fefcfa" stroke="#d6cfc8" stroke-width="1.2"
          transform="rotate(-7 37 49)"/>
    <rect x="8" y="8" width="74" height="98" rx="3" fill="#fefcfa" stroke="#d6cfc8" stroke-width="1.2"/>
    <rect x="14" y="14" width="74" height="98" rx="3" fill="#fefcfa" stroke="#9E1B32" stroke-width="1.4"
          transform="rotate(5 51 63)"/>
    <line x1="28" y1="38" x2="92" y2="38" stroke="#d6cfc8" stroke-width="1"
          transform="rotate(5 51 63)"/>
    <line x1="28" y1="52" x2="92" y2="52" stroke="#d6cfc8" stroke-width="1"
          transform="rotate(5 51 63)"/>
    <line x1="28" y1="66" x2="84" y2="66" stroke="#d6cfc8" stroke-width="1"
          transform="rotate(5 51 63)"/>
    <text x="40" y="155" font-size="22" font-weight="700" fill="#9E1B32"
          letter-spacing="0.1em" text-anchor="middle">RESPONSES</text>
  </g>

  <!-- footnote -->
  <text x="120" y="1005" font-size="22" fill="#8a8278">
    Each card is one paste-ready prompt. The token at left only happens once per machine; the response stack at right is what you analyze.
  </text>
  <text x="120" y="1042" font-size="22" fill="#8a8278">
    Steps 02–08 repeat for every new survey or cohort.
  </text>
</svg>

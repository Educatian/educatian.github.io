<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750"
     font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid5" width="160" height="115" patternUnits="userSpaceOnUse">
      <path d="M160 0 H0 V115" fill="none" stroke="#ebe5e0" stroke-width="0.5" stroke-dasharray="2 4"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="750" fill="#fdf8f5"/>

  <!-- title -->
  <text x="100" y="60" font-size="13" font-weight="700"
        letter-spacing="0.16em" fill="#9E1B32" text-transform="uppercase">FIGURE · STEP 05</text>
  <text x="100" y="92" font-size="22" font-weight="700" fill="#2c2a29">
    Perception × efficacy footprint — five constructs the in-app self-assessment doesn't already cover
  </text>

  <!-- plot area -->
  <g transform="translate(180,150)">
    <rect width="800" height="500" fill="url(#grid5)" stroke="#d6cfc8" stroke-width="1"/>

    <!-- axes -->
    <line x1="0" y1="500" x2="800" y2="500" stroke="#2c2a29" stroke-width="1.5"/>
    <line x1="0" y1="0"   x2="0"   y2="500" stroke="#2c2a29" stroke-width="1.5"/>

    <!-- axis labels -->
    <text x="400" y="540" font-size="13" fill="#2c2a29" text-anchor="middle" font-weight="600">
      Perception of program/credential  →
    </text>
    <text x="-12" y="250" font-size="13" fill="#2c2a29" font-weight="600"
          text-anchor="middle" transform="rotate(-90,-12,250)">
      ↑  Self-efficacy / agency
    </text>

    <!-- low / high axis end labels -->
    <text x="6"   y="495" font-size="10" fill="#8a8278">low</text>
    <text x="780" y="495" font-size="10" fill="#8a8278">high</text>
    <text x="-30" y="498" font-size="10" fill="#8a8278">low</text>
    <text x="-30" y="14"  font-size="10" fill="#8a8278">high</text>

    <!-- quadrant whisper labels -->
    <text x="200" y="440" font-size="11" fill="#bfb3a8" font-style="italic" text-anchor="middle">
      not measured here
    </text>
    <text x="600" y="440" font-size="11" fill="#bfb3a8" font-style="italic" text-anchor="middle">
      perception-only constructs
    </text>
    <text x="200" y="60"  font-size="11" fill="#bfb3a8" font-style="italic" text-anchor="middle">
      efficacy-only constructs
    </text>
    <text x="600" y="60"  font-size="11" fill="#bfb3a8" font-style="italic" text-anchor="middle">
      identity-bound (perception + efficacy)
    </text>

    <!-- mid lines (subtle) -->
    <line x1="400" y1="0"   x2="400" y2="500" stroke="#ebe5e0" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="0"   y1="250" x2="800" y2="250" stroke="#ebe5e0" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- data points (cx, cy, label) -->
    <!-- UMUX: high perception, low efficacy -->
    <g>
      <circle cx="640" cy="430" r="9" fill="#9E1B32"/>
      <line x1="649" y1="430" x2="675" y2="430" stroke="#9E1B32" stroke-width="1"/>
      <text x="681" y="425" font-size="13" font-weight="700" fill="#2c2a29">UMUX usability</text>
      <text x="681" y="442" font-size="11" fill="#6e6967">Post · 4 items · α .79–.83</text>
    </g>

    <!-- Credential Value: very high perception, low-mid efficacy -->
    <g>
      <circle cx="730" cy="370" r="9" fill="#9E1B32"/>
      <line x1="721" y1="370" x2="690" y2="370" stroke="#9E1B32" stroke-width="1"/>
      <text x="685" y="365" font-size="13" font-weight="700" fill="#2c2a29" text-anchor="end">Credential Value</text>
      <text x="685" y="382" font-size="11" fill="#6e6967" text-anchor="end">Pre→Post · 4 items · α .78+</text>
    </g>

    <!-- Designer Identity: middle/middle -->
    <g>
      <circle cx="430" cy="240" r="9" fill="#9E1B32"/>
      <line x1="439" y1="240" x2="475" y2="240" stroke="#9E1B32" stroke-width="1"/>
      <text x="481" y="235" font-size="13" font-weight="700" fill="#2c2a29">Designer Identity</text>
      <text x="481" y="252" font-size="11" fill="#6e6967">Pre ⇄ Post (paired) · 4 items · α .85</text>
    </g>

    <!-- AI-use SE: low-mid perception, high efficacy -->
    <g>
      <circle cx="220" cy="100" r="9" fill="#9E1B32"/>
      <line x1="229" y1="100" x2="265" y2="100" stroke="#9E1B32" stroke-width="1"/>
      <text x="271" y="95" font-size="13" font-weight="700" fill="#2c2a29">AI-use Self-Efficacy</text>
      <text x="271" y="112" font-size="11" fill="#6e6967">Pre ⇄ Post (paired) · 4 items · α .84+</text>
    </g>

    <!-- TSE Contagion: mid perception, very high efficacy -->
    <g>
      <circle cx="380" cy="55" r="9" fill="#9E1B32"/>
      <line x1="389" y1="55" x2="425" y2="55" stroke="#9E1B32" stroke-width="1"/>
      <text x="431" y="50" font-size="13" font-weight="700" fill="#2c2a29">Teaching Efficacy Contagion</text>
      <text x="431" y="67" font-size="11" fill="#6e6967">Post · 3 items · α .80+</text>
    </g>
  </g>

  <!-- legend / footnote -->
  <text x="100" y="710" font-size="11" fill="#8a8278">
    Each marker = one construct block in the surveys. Wider plot — what's tested. Lower-left quadrant deliberately empty:
    those signals already live in the in-app pre/post 8-skill self-assessment, exit tickets, and rubric.
  </text>
</svg>

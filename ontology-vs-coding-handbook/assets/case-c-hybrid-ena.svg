<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid SKOS, coded discourse, and ENA projection</title>
  <desc id="desc">A blue SKOS backbone supports two coded transcript panels, which connect upward to an ENA-style co-occurrence projection with blue and amber networks.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#1a1a1a"/></marker><pattern id="grain" width="16" height="16" patternUnits="userSpaceOnUse"><path d="M2 4h1M11 7h1M5 13h1" stroke="#1a1a1a" stroke-opacity=".07"/></pattern>
  <style>.bg{fill:#fbfaf6}.blue{stroke:#1d4e89}.amber{stroke:#92400e}.ink{stroke:#1a1a1a}.line{fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.hair{fill:none;stroke-width:2.3;stroke-linecap:round}.label{font:600 23px Inter,Segoe UI,Arial,sans-serif;fill:#1a1a1a}.small{font:500 18px Inter,Segoe UI,Arial,sans-serif;fill:#424242}</style></defs>
  <rect class="bg" width="1200" height="900"/><rect width="1200" height="900" fill="url(#grain)" opacity=".55"/>
  <rect x="180" y="700" width="840" height="86" rx="8" fill="#1d4e89" opacity=".12" stroke="#1d4e89" stroke-width="5"/><text x="600" y="755" class="label" text-anchor="middle">SKOS backbone</text>
  <g class="blue"><circle cx="350" cy="718" r="12" fill="#fbfaf6" stroke-width="4"/><circle cx="520" cy="718" r="12" fill="#fbfaf6" stroke-width="4"/><circle cx="690" cy="718" r="12" fill="#fbfaf6" stroke-width="4"/><circle cx="860" cy="718" r="12" fill="#fbfaf6" stroke-width="4"/><path d="M362 718h146M532 718h146M702 718h146" class="line"/></g>
  <g transform="translate(215 390)"><rect x="0" y="0" width="330" height="220" rx="6" fill="#1d4e89" opacity=".08" stroke="#1d4e89" stroke-width="4"/><text x="165" y="36" class="label" text-anchor="middle">LS corpus</text><path d="M42 70h160M42 106h200M42 142h138M42 178h182" class="hair blue"/><path d="M238 72h56M238 112h42M238 154h62" class="hair amber"/></g>
  <g transform="translate(655 390)"><rect x="0" y="0" width="330" height="220" rx="6" fill="#92400e" opacity=".08" stroke="#92400e" stroke-width="4"/><text x="165" y="36" class="label" text-anchor="middle">ET corpus</text><path d="M42 70h180M42 106h144M42 142h206M42 178h120" class="hair amber"/><path d="M248 72h48M238 112h62M238 154h40" class="hair blue"/></g>
  <g fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" opacity=".65"><path d="M380 610C390 645 420 670 500 700"/><path d="M820 610C805 648 770 675 700 700"/><path d="M420 390C450 325 500 280 565 250"/><path d="M780 390C750 325 700 280 635 250"/></g>
  <g transform="translate(390 80)"><rect x="0" y="0" width="420" height="240" rx="8" fill="#fff" stroke="#d9d6cf"/><text x="210" y="40" class="small" text-anchor="middle">projected co-occurrence space</text><path d="M65 190h310M82 205V66" class="hair ink" opacity=".45"/><g class="blue"><path d="M145 146l72-52l88 36l-45 62z" class="line" opacity=".8"/><circle cx="145" cy="146" r="10" fill="#fbfaf6" stroke-width="4"/><circle cx="217" cy="94" r="10" fill="#fbfaf6" stroke-width="4"/><circle cx="305" cy="130" r="10" fill="#fbfaf6" stroke-width="4"/><circle cx="260" cy="192" r="10" fill="#fbfaf6" stroke-width="4"/></g><g class="amber"><path d="M190 166l78-66l70 68l-98 32z" class="line" opacity=".8"/><circle cx="190" cy="166" r="10" fill="#fbfaf6" stroke-width="4"/><circle cx="268" cy="100" r="10" fill="#fbfaf6" stroke-width="4"/><circle cx="338" cy="168" r="10" fill="#fbfaf6" stroke-width="4"/><circle cx="240" cy="200" r="10" fill="#fbfaf6" stroke-width="4"/></g></g>
</svg>

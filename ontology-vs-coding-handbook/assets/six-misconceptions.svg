<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">Six misconceptions grid</title>
  <desc id="desc">A two-by-three grid of numbered amber line illustrations: mismatched rulers, a neat label over a torn page, a frozen taxonomy, discarded memos, empty categories beside dense themes, and a badly angled knot.</desc>
  <defs><pattern id="grain" width="15" height="15" patternUnits="userSpaceOnUse"><path d="M2 4h1M10 7h1M5 13h1" stroke="#1a1a1a" stroke-opacity=".07"/></pattern>
  <style>.bg{fill:#fbfaf6}.cell{fill:#fff;stroke:#d9d6cf}.amber{stroke:#92400e}.line{fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.hair{fill:none;stroke-width:2.4;stroke-linecap:round}.num{font:800 28px Inter,Segoe UI,Arial,sans-serif;fill:#92400e}.tiny{font:600 17px Inter,Segoe UI,Arial,sans-serif;fill:#92400e}</style></defs>
  <rect class="bg" width="1000" height="1000"/><rect width="1000" height="1000" fill="url(#grain)" opacity=".55"/>
  <g transform="translate(45 50)">
    <g transform="translate(0 0)"><rect class="cell" width="280" height="260" rx="8"/><text class="num" x="22" y="42">01</text><path class="line amber" d="M70 166l145-92M105 204l92-145M72 166l28 42M96 150l28 42M120 135l28 42M145 118l28 42M170 102l28 42"/><circle cx="200" cy="190" r="42" class="line amber"/></g>
    <g transform="translate(315 0)"><rect class="cell" width="280" height="260" rx="8"/><text class="num" x="22" y="42">02</text><path class="line amber" d="M84 70h118l-18 48l28 42l-42 38H84z"/><rect x="74" y="106" width="142" height="58" rx="4" fill="#fbfaf6" stroke="#92400e" stroke-width="4"/><path class="hair amber" d="M96 134h96M98 148h82"/></g>
    <g transform="translate(630 0)"><rect class="cell" width="280" height="260" rx="8"/><text class="num" x="22" y="42">03</text><path class="line amber" d="M65 198h150M85 198v-85a75 75 0 0 1 150 0v85M85 116h150"/><path class="hair amber" d="M160 74v108M116 112h88M126 148h68"/><path class="hair amber" d="M60 210h175"/></g>
    <g transform="translate(0 315)"><rect class="cell" width="280" height="260" rx="8"/><text class="num" x="22" y="42">04</text><path class="line amber" d="M76 92h86M90 92l20 120h92l20-120M84 123h130"/><path class="hair amber" d="M42 92l62-32M62 72l70 22M154 64l36 30M108 152h58M118 178h48"/></g>
    <g transform="translate(315 315)"><rect class="cell" width="280" height="260" rx="8"/><text class="num" x="22" y="42">05</text><path class="line amber" d="M65 210h78v-35H72v-34h64v-34H78V72h58"/><text class="tiny" x="83" y="96">category</text><path class="hair amber" d="M190 204c-22-20-20-46 6-64c28 12 38 38 22 62M220 204c4-34 24-54 58-62c15 26 4 54-28 64M184 215h105"/></g>
    <g transform="translate(630 315)"><rect class="cell" width="280" height="260" rx="8"/><text class="num" x="22" y="42">06</text><path class="line amber" d="M58 155c55-36 104-40 148-12c24 15 42 22 74 16M56 108c68 34 111 70 130 109M212 70c-22 54-58 92-108 114"/><circle cx="164" cy="154" r="36" fill="none" stroke="#92400e" stroke-width="5"/></g>
  </g>
</svg>

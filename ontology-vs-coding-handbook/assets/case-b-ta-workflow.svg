<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Reflexive thematic analysis workflow</title>
  <desc id="desc">Six amber hand-worked vignettes show marked transcripts, sticky notes, theme clusters, revisions, definitions, and a final report linked by looping dotted arrows.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#92400e"/></marker><pattern id="grain" width="16" height="16" patternUnits="userSpaceOnUse"><path d="M2 3h1M12 6h1M6 13h1" stroke="#1a1a1a" stroke-opacity=".07"/></pattern>
  <style>.bg{fill:#fbfaf6}.amber{stroke:#92400e}.line{fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.dot{fill:none;stroke:#92400e;stroke-width:3;stroke-linecap:round;stroke-dasharray:4 11;marker-end:url(#arrow)}.label{font:600 20px Inter,Segoe UI,Arial,sans-serif;fill:#1a1a1a}.hair{fill:none;stroke-width:2.4;stroke-linecap:round}</style></defs>
  <rect class="bg" width="1200" height="900"/><rect width="1200" height="900" fill="url(#grain)" opacity=".55"/>
  <path class="dot" d="M270 275C365 235 450 235 525 275"/><path class="dot" d="M650 310C720 370 735 455 690 535"/><path class="dot" d="M560 615C462 660 355 650 260 590"/><path class="dot" d="M245 475C220 395 230 335 300 300"/><path class="dot" d="M795 590C880 545 930 455 900 350"/>
  <g transform="translate(105 175)" class="amber"><rect x="0" y="0" width="190" height="150" rx="6" fill="#fbfaf6" stroke="#92400e" stroke-width="4"/><path d="M28 36h130M28 68h110M28 100h130" class="hair"/><path d="M98 58c34 18 54 40 60 68M20 160c32-28 70-40 114-36" class="line"/></g><text x="200" y="365" class="label" text-anchor="middle">familiarization</text>
  <g transform="translate(500 170)" class="amber"><rect x="0" y="0" width="58" height="54" fill="#92400e" opacity=".13" stroke="#92400e" stroke-width="3"/><rect x="80" y="20" width="58" height="54" fill="#92400e" opacity=".13" stroke="#92400e" stroke-width="3"/><rect x="35" y="85" width="58" height="54" fill="#92400e" opacity=".13" stroke="#92400e" stroke-width="3"/><rect x="125" y="100" width="58" height="54" fill="#92400e" opacity=".13" stroke="#92400e" stroke-width="3"/></g><text x="590" y="365" class="label" text-anchor="middle">initial codes</text>
  <g transform="translate(830 205)" class="amber"><circle cx="45" cy="56" r="34" fill="none" stroke="#92400e" stroke-width="4"/><circle cx="116" cy="50" r="34" fill="none" stroke="#92400e" stroke-width="4"/><circle cx="85" cy="122" r="34" fill="none" stroke="#92400e" stroke-width="4"/><path d="M70 64h24M94 82l-8 20" class="hair"/></g><text x="915" y="405" class="label" text-anchor="middle">searching themes</text>
  <g transform="translate(755 540)" class="amber"><rect x="0" y="0" width="190" height="130" rx="6" fill="#fbfaf6" stroke="#92400e" stroke-width="4"/><path d="M30 38h120M30 72h132M30 102h82" class="hair"/><path d="M34 34l112 72M146 34L34 106" class="line"/></g><text x="850" y="715" class="label" text-anchor="middle">reviewing</text>
  <g transform="translate(455 570)" class="amber"><rect x="0" y="0" width="185" height="130" rx="6" fill="#fbfaf6" stroke="#92400e" stroke-width="4"/><path d="M28 38h126M28 70h96M28 102h142" class="hair"/><text x="18" y="40" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" fill="#92400e">1</text><text x="18" y="72" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" fill="#92400e">2</text><text x="18" y="104" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" fill="#92400e">3</text></g><text x="548" y="745" class="label" text-anchor="middle">defining and naming</text>
  <g transform="translate(145 510)" class="amber"><rect x="0" y="0" width="180" height="150" rx="4" fill="#fbfaf6" stroke="#92400e" stroke-width="4"/><path d="M30 40h120M30 70h132M30 100h100M30 130h130" class="hair"/></g><text x="235" y="715" class="label" text-anchor="middle">producing report</text>
</svg>

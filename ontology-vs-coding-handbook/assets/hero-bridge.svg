      .bfill{fill:#1d4e89}.afill{fill:#92400e}.thin{stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .hair{stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.wash{opacity:.12}
    </style>
  </defs>

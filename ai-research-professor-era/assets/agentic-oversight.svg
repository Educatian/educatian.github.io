<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" rx="40" fill="#1E1A1A"/>
  <rect x="60" y="60" width="1280" height="780" rx="28" fill="#262121" stroke="#564C4C" stroke-width="2"/>
  <text x="96" y="128" fill="#F6E8EA" font-family="Noto Sans KR, Arial, sans-serif" font-size="30" font-weight="800">Agentic Research Workflow</text>
  <text x="96" y="168" fill="#C9BCB8" font-family="Noto Sans KR, Arial, sans-serif" font-size="20">A professor-level design using HITL, HOTL, and HIC oversight</text>

  <rect x="120" y="250" width="1160" height="122" rx="26" fill="#FFF8F7"/>
  <text x="160" y="302" fill="#9E1B32" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700">STEP 1</text>
  <text x="160" y="340" fill="#171616" font-family="Noto Sans KR, Arial, sans-serif" font-size="30" font-weight="800">Scout agent</text>
  <text x="420" y="340" fill="#5B514A" font-family="Noto Sans KR, Arial, sans-serif" font-size="22">literature search, clustering, source triage</text>

  <rect x="120" y="404" width="1160" height="122" rx="26" fill="#F0DEDE"/>
  <text x="160" y="456" fill="#9E1B32" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700">STEP 2</text>
  <text x="160" y="494" fill="#171616" font-family="Noto Sans KR, Arial, sans-serif" font-size="30" font-weight="800">Draft agent</text>
  <text x="420" y="494" fill="#5B514A" font-family="Noto Sans KR, Arial, sans-serif" font-size="22">notes, first draft, code scaffold, table shell</text>

  <rect x="120" y="558" width="1160" height="122" rx="26" fill="#E0C3C7"/>
  <text x="160" y="610" fill="#9E1B32" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700">STEP 3</text>
  <text x="160" y="648" fill="#171616" font-family="Noto Sans KR, Arial, sans-serif" font-size="30" font-weight="800">Verifier agent</text>
  <text x="420" y="648" fill="#5B514A" font-family="Noto Sans KR, Arial, sans-serif" font-size="22">citation tracing, fact check, code review, disclosure prep</text>

  <rect x="120" y="712" width="1160" height="92" rx="24" fill="#9E1B32"/>
  <text x="160" y="768" fill="#FFF8F7" font-family="Noto Sans KR, Arial, sans-serif" font-size="30" font-weight="800">Professor judgment</text>
  <text x="500" y="768" fill="#F3D7DB" font-family="Noto Sans KR, Arial, sans-serif" font-size="22">question framing, interpretation, authorship, final responsibility</text>

  <rect x="980" y="238" width="238" height="58" rx="16" fill="#2F2525" stroke="#8F6A71" stroke-width="2"/>
  <text x="1012" y="274" fill="#F6E8EA" font-family="Noto Sans KR, Arial, sans-serif" font-size="20" font-weight="700">HOTL</text>
  <text x="1064" y="274" fill="#D9C8C4" font-family="Noto Sans KR, Arial, sans-serif" font-size="18">monitor flow</text>

  <rect x="980" y="392" width="238" height="58" rx="16" fill="#2F2525" stroke="#8F6A71" stroke-width="2"/>
  <text x="1012" y="428" fill="#F6E8EA" font-family="Noto Sans KR, Arial, sans-serif" font-size="20" font-weight="700">HITL</text>
  <text x="1064" y="428" fill="#D9C8C4" font-family="Noto Sans KR, Arial, sans-serif" font-size="18">approve actions</text>

  <rect x="980" y="546" width="238" height="58" rx="16" fill="#2F2525" stroke="#8F6A71" stroke-width="2"/>
  <text x="1012" y="582" fill="#F6E8EA" font-family="Noto Sans KR, Arial, sans-serif" font-size="20" font-weight="700">HIC</text>
  <text x="1056" y="582" fill="#D9C8C4" font-family="Noto Sans KR, Arial, sans-serif" font-size="18">set boundaries</text>
</svg>
